name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/travelgpt

jobs:
  # ============= Pre-deployment Checks =============
  pre-deploy:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      environment: ${{ inputs.environment || 'staging' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if should deploy
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "can_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "can_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "can_deploy=false" >> $GITHUB_OUTPUT
          fi

  # ============= Backend Deployment =============
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.can_deploy == 'true'
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: ${{ inputs.environment == 'production' && 'https://api.travelgpt.vn' || 'https://staging-api.travelgpt.vn' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
        working-directory: backend
      
      - name: Run Prisma migrations
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Pull Docker image
        run: |
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/travelgpt-backend:latest || true
        continue-on-error: true
      
      - name: Deploy to Server (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/travelgpt
            
            # Pull latest changes
            git pull origin main
            
            # Build Docker image
            docker build -t travelgpt-backend ./backend
            
            # Stop old container
            docker stop travelgpt-backend || true
            docker rm travelgpt-backend || true
            
            # Start new container
            docker run -d \
              --name travelgpt-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DATABASE_URL=$DATABASE_URL \
              -e REDIS_URL=$REDIS_URL \
              -e JWT_SECRET_KEY=$JWT_SECRET_KEY \
              -e AICLIEN2_API_KEY=$AICLIEN2_API_KEY \
              travelgpt-backend
            
            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1

  # ============= Frontend Deployment =============
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.can_deploy == 'true'
    environment:
      name: ${{ inputs.environment || 'staging' }}
      url: ${{ inputs.environment == 'production' && 'https://travelgpt.vn' || 'https://staging.travelgpt.vn' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      
      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      
      - name: Deploy to Vercel (Production)
        if: inputs.environment == 'production' || github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

  # ============= Post-deployment =============
  post-deploy:
    name: Post-deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run smoke tests
        run: |
          sleep 5
          curl -f https://${{ inputs.environment || 'staging' }}-api.travelgpt.vn/health
          curl -f https://${{ inputs.environment || 'staging' }}.travelgpt.vn
        continue-on-error: true
      
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.deploy-backend.result == 'success' && '✅' || '❌' }} Backend deployed to ${{ inputs.environment || 'staging' }}\n${{ needs.deploy-frontend.result == 'success' && '✅' || '❌' }} Frontend deployed to ${{ inputs.environment || 'staging' }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      
      - name: Create deployment record
        run: |
          echo "Deployment completed at $(date)" >> deployments.log
          echo "Commit: ${{ github.sha }}" >> deployments.log
          echo "Environment: ${{ inputs.environment || 'staging' }}" >> deployments.log
